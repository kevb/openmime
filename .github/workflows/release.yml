name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          if [[ -d /Applications/Xcode_16.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          fi
          xcodebuild -version
          swift --version
      - name: Test
        run: swift test
      - name: Build universal app
        run: Scripts/build_universal_app.sh
      - name: Package DMG
        run: Scripts/package_dmg.sh
      - name: Verify release assets
        run: |
          codesign --verify --deep --strict dist/OpenMime.app
          test "$(lipo -archs dist/OpenMime.app/Contents/MacOS/OpenMime)" = "x86_64 arm64" || \
            test "$(lipo -archs dist/OpenMime.app/Contents/MacOS/OpenMime)" = "arm64 x86_64"
          hdiutil verify dist/OpenMime.dmg
          (cd dist && shasum -a 256 -c OpenMime.dmg.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: OpenMime-${{ github.ref_name }}
          path: |
            dist/OpenMime.dmg
            dist/OpenMime.dmg.sha256
          retention-days: 30
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/OpenMime.dmg dist/OpenMime.dmg.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/OpenMime.dmg dist/OpenMime.dmg.sha256 \
              --title "OpenMime $GITHUB_REF_NAME" --generate-notes --prerelease
          fi
